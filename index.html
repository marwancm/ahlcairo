<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم أهل كايرو</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a6b1a 0%, #2d8a2d 30%, #145214 70%, #0e3d0e 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 40px 28px 36px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* Logo */
    .logo-wrapper {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255, 220, 0, 0.8);
      box-shadow: 0 0 0 6px rgba(255,220,0,0.15), 0 8px 24px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Name & bio */
    .info {
      text-align: center;
    }

    .info h1 {
      color: #fff;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .info .tagline {
      color: rgba(255,255,255,0.82);
      font-size: 0.92rem;
      margin-top: 8px;
      line-height: 1.7;
      max-width: 360px;
    }

    .info .location {
      color: rgba(255,255,255,0.65);
      font-size: 0.85rem;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .info .location i {
      color: #ffd700;
    }

    /* Social icons */
    .socials {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .socials a {
      color: rgba(255,255,255,0.85);
      font-size: 1.4rem;
      transition: color 0.2s, transform 0.2s;
      text-decoration: none;
    }

    .socials a:hover {
      color: #ffd700;
      transform: scale(1.15);
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    /* Link buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative;
      width: 100%;
    }

    .link-btn:hover {
      background: rgba(255, 220, 0, 0.2);
      border-color: rgba(255,220,0,0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .link-btn .btn-icon {
      font-size: 1.3rem;
      width: 28px;
      text-align: center;
      color: #ffd700;
      flex-shrink: 0;
    }

    .link-btn .btn-label {
      flex: 1;
      text-align: center;
    }

    .link-btn .btn-arrow {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      flex-shrink: 0;
    }

    /* Menu modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #1a6b1a;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.2);
    }

    .modal-body {
      overflow-y: auto;
    }

    .modal-body img {
      width: 100%;
      display: block;
    }

    /* Phone button */
    .phone-btn {
      background: rgba(255, 220, 0, 0.18);
      border-color: rgba(255,220,0,0.35);
    }

    /* Footer */
    .footer {
      color: rgba(255,255,255,0.4);
      font-size: 0.78rem;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      body { padding: 24px 12px 48px; }
      .card { padding: 32px 18px 28px; border-radius: 22px; }
      .info h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo-wrapper">
      <img src="logo.png" alt="شعار مطعم أهل كايرو" />
    </div>

    <!-- Info -->
    <div class="info">
      <h1>مطعم أهل كايرو</h1>
      <p class="tagline">
        استمتع بأصل المأكولات المصرية – ملوخية، محشي، مشويات، وأكثر<br />
        بنكهات تقليدية وجودة عالية في كل وجبة
      </p>
      <p class="location">
        <i class="fas fa-location-dot"></i>
        خميس مشيط، المملكة العربية السعودية
      </p>
    </div>

    <!-- Social links -->
    <div class="socials">
      <a href="https://www.facebook.com/profile.php?id=61567594162466&mibextid=wwXIfr&rdid=FzFrAcMURRyESadD&share_url=https%3A%2F%2Fwww.facebook.com%2Fshare%2F1AcVdUZpU2%2F%3Fmibextid%3DwwXIfr#" target="_blank" title="فيسبوك">
        <i class="fab fa-facebook"></i>
      </a>
    </div>

    <div class="divider"></div>

    <!-- Link buttons -->
    <div class="links">

      <!-- Menu -->
      <button class="link-btn" onclick="openModal()">
        <span class="btn-icon"><i class="fas fa-utensils"></i></span>
        <span class="btn-label">المينيو</span>
        <span class="btn-arrow"><i class="fas fa-chevron-left"></i></span>
      </button>

      <!-- Phone -->
      <a class="link-btn phone-btn" href="tel:0502056301">
        <span class="btn-icon"><i class="fas fa-phone"></i></span>
        <span class="btn-label">اتصل بنا – 0502056301</span>
        <span class="btn-arrow"><i class="fas fa-chevron-left"></i></span>
      </a>

      <!-- WhatsApp -->
      <a class="link-btn" href="https://wa.me/966502056301" target="_blank">
        <span class="btn-icon"><i class="fab fa-whatsapp"></i></span>
        <span class="btn-label">واتساب</span>
        <span class="btn-arrow"><i class="fas fa-chevron-left"></i></span>
      </a>

      <!-- Location -->
      <a class="link-btn" href="https://maps.app.goo.gl/k5iyZ1qZFeo6sZtz7" target="_blank">
        <span class="btn-icon"><i class="fas fa-map-location-dot"></i></span>
        <span class="btn-label">موقعنا على الخريطة</span>
        <span class="btn-arrow"><i class="fas fa-chevron-left"></i></span>
      </a>

    </div>

    <div class="footer">مطعم أهل كايرو &copy; 2026 – جميع الحقوق محفوظة</div>

  </div>

  <!-- Menu Modal -->
  <div class="modal-overlay" id="menuModal" onclick="handleOverlayClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <span>المينيو</span>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <img src="menu.png" alt="منيو مطعم أهل كايرو" />
      </div>
    </div>
  </div>

  <script>
    function openModal() {
      document.getElementById('menuModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('menuModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('menuModal')) {
        closeModal();
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
